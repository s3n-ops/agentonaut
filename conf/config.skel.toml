#
# Profile Architecture & Relationships
#
# profile.agent.* (claude, gemini)
#   └─ 1:1 profile.container.* (claude, gemini)
#
# profile.kube.* (minimal, full, nushell, docs)   ← agent-agnostic MCP sets
#   └─ 0:N profile.mcp.* (nushell, docs-mcp-server)
#          └─ 1:1 profile.container.* (mcp-*)
#
# profile.docs.* (standalone: nushell, ansible, podman, claude-code)
#
# Design:
#  • Kube profiles define which MCP servers run alongside any agent.
#  • Agent profiles define the container image and data paths.
#  • The combination of agent + kube profile is chosen at launch time.
#  • Nested tables with implicit IDs from TOML keys.
#  • CLI accepts short form (claude) resolved to namespace.
#  • References use simple names without prefixes.
#

[agentonaut]
path = "."
default_agent = "gemini"

[profile.agent.gemini]
container = "gemini"
yaml_file = "conf/kube/gemini.yaml"
data_path_host = "~/.local/share/agentonaut/gemini"
data_path_container = "/home/gemini/.gemini"
config_path = "~/.config/agentonaut/gemini/gemini.json"
chat_base_path = "~/Documents/agentonaut/gemini"
mcp_command = "gemini mcp add --transport {transport} {name} {url}"

[profile.agent.claude]
container = "claude"
yaml_file = "conf/kube/claude.yaml"
data_path_host = "~/.local/share/agentonaut/claude"
data_path_container = "/home/claude/.claude"
config_path = "~/.config/agentonaut/claude/claude.json"
chat_base_path = "~/Documents/agentonaut/claude"
mcp_command = "claude mcp add --transport {transport} {name} {url}"

[agentonaut.podman]
network = "agentonaut-network"
pod_name = "agentonaut-pod"


#
# Podman Kube YAML Profiles
#
# Agent-agnostic MCP sets: define which MCP servers run alongside any agent.
# The agent determines the container image; the kube profile determines the MCPs.
#
[kube]
default_profile = "minimal"
tmp_file_path = "/tmp/agentonaut/kube.yaml"
template_dir = "conf/kube/templates"

[profile.kube.minimal]
description = "Agent only, no MCPs"
mcp_profiles = []

[profile.kube.full]
description = "Nushell + Docs MCP"
mcp_profiles = ["nushell", "docs-mcp-server"]

[profile.kube.nushell]
description = "Nushell MCP only"
mcp_profiles = ["nushell"]

[profile.kube.docs]
description = "Docs MCP only"
mcp_profiles = ["docs-mcp-server"]

[profile.mcp.nushell]
container = "mcp-nushell"
yaml_file = "conf/kube/mcp-nushell.yaml"
name = "mcp-nushell"
transport = "http"
url = "http://mcp-nushell:8001/mcp"

[profile.mcp.docs-mcp-server]
container = "docs-mcp-server"
yaml_file = "conf/kube/docs-mcp-server.yaml"
name = "docs-mcp-server"
transport = "http"
url = "http://docs-mcp-server:6280/mcp"
web_url = "http://127.0.0.1:6280"

#
# Documentation Profiles
#
# Profiles for downloading docs repositories and indexing them with docs-mcp-server.
#
# repo:         Git repository URL (optional; omit for web-only docs)
# target_dir:   Local directory to clone repository into
# branch:       Git branch to checkout (default: "main")
# depth:        Optional shallow clone depth (null = full clone)
# description:  Human-readable description
# library_name: Name used to register the library in docs-mcp-server
# mcp_url:      URL passed to docs-mcp-server scrape (file:/// or https://)

[docs]
base_dir = "~/Documents/agentonaut/offline-documentation"

[profile.docs.nushell]
repo = "https://github.com/nushell/nushell.github.io.git"
target_dir = "nushell"
branch = "main"
depth = 1
description = "Nushell official documentation website"
library_name = "nushell-documentation"
mcp_url = "file:///docs/nushell/book"

[profile.docs.ansible]
