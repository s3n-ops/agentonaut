# Container Build Profiles
# Container image definitions for building
# origin: "upstream" (from external repo) or "local" (from this project)
# repo: Git repository URL (only for origin = "upstream")
# local_dir: Local directory containing container image definition
# containerfile: Path to Containerfile/Dockerfile (relative to local_dir)
# context: Build context directory (relative to local_dir, where COPY commands resolve from)
# image_tag: Full image tag for the built image
# base_image_override: Optional base image override (replaces FROM statement in containerfile)
# description: Human-readable description

[profile.container.claude-contrib]
origin = "upstream"
repo = "https://github.com/anthropics/claude-code"
local_dir = "container/contrib/claude-code"
containerfile = ".devcontainer/Dockerfile"
context = ".devcontainer"
image_tag = "localhost/claude-code-devcontainer:latest"
base_image_override = "node:20-trixie"
description = "Base Claude Code devcontainer image from upstream"

[profile.container.claude]
origin = "local"
local_dir = "container/custom/claude-code"
containerfile = "Containerfile"
context = "."
image_tag = "localhost/claude-code:latest"
container_name = "claude-code"
home_path = "/home/claude"
description = "Customized Claude Code container image"
version_check = { repo = "https://github.com/anthropics/claude-code", build_arg = "CLAUDE_VERSION" }
depends_on = []
podman_args = []
container_args = []
podman_mounts = []
env_vars = { CLAUDE_CODE_ENABLE_TELEMETRY = "0" }

[profile.container.gemini-contrib]
origin = "upstream"
repo = "https://github.com/google-gemini/gemini-cli"
local_dir = "container/contrib/gemini"
containerfile = "Dockerfile"
context = "."
image_tag = "localhost/gemini-contrib:latest"
description = "Official Gemini CLI container image from upstream"

[profile.container.gemini]
origin = "local"
local_dir = "container/custom/gemini"
containerfile = "Containerfile"
context = "."
image_tag = "localhost/gemini:latest"
home_path = "/home/gemini"
description = "Google Gemini CLI container"
depends_on = []
version_check = { repo = "https://github.com/google-gemini/gemini-cli", build_arg = "GEMINI_VERSION" }
podman_args = ["--security-opt", "seccomp=unconfined"]
podman_mounts = [
    { source = "~/.local/share/agentonaut/gemini", target = "/home/gemini/.gemini", mode = "rw" },
]
env_vars = { GEMINI_TELEMETRY_ENABLED = "false" }

[profile.container.mcp-nushell]
origin = "local"
local_dir = "container/custom/mcp-nushell"
containerfile = "Containerfile"
context = "."
image_tag = "localhost/mcp-nushell:latest"
container_name = "mcp-nushell"
description = "Nushell MCP Server with native HTTP transport (Official Binary)"
container_args = ["--mcp", "--mcp-transport", "http", "--mcp-port", "8001"]
podman_args = []
env_vars = { NU_LOG_LEVEL = "info" }
version_check = { repo = "https://github.com/nushell/nushell", build_arg = "NUSHELL_VERSION" }

[profile.container.docs-mcp-server-contrib]
origin = "upstream"
repo = "https://github.com/arabold/docs-mcp-server"
local_dir = "container/contrib/docs-mcp-server"
containerfile = "Dockerfile"
context = "."
image_tag = "localhost/docs-mcp-server-contrib:latest"
description = "Docs MCP Server from upstream repository"

[profile.container.docs-mcp-server]
origin = "local"
local_dir = "container/custom/docs-mcp-server"
containerfile = "Containerfile"
context = "."
image_tag = "localhost/docs-mcp-server:latest"
container_name = "docs-mcp-server"
description = "Customized Docs MCP Server for documentation indexing"
depends_on = ["docs-mcp-server-contrib"]
podman_args = ["--detach", "--security-opt", "seccomp=unconfined"]
container_args = [
    "--protocol",
    "http",
    "--host",
    "0.0.0.0",
    "--port",
    "6280",
    "--telemetry",
    "false",
]
podman_mounts = [
    { source = "docs-mcp-server-data", target = "/data", mode = "rw" },
]
